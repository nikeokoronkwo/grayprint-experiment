<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none" role="img" aria-label="Grayprint">
  <defs>
    <linearGradient id="gp-zing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A3E635"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <pattern id="gp-grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.25"/>
    </pattern>
  </defs>
  <!-- Logomark: blueprint G with a zing -->
  <g transform="translate(4 4)">
    <rect width="56" height="56" rx="10" fill="#0A1330"/>
    <rect width="56" height="56" rx="10" fill="url(#gp-grid)"/>
    <!-- G strokes -->
    <path d="M44 18.5C41.3 14.5 36.7 12 31.5 12 22.9 12 16 18.9 16 27.5S22.9 43 31.5 43c5.2 0 9.8-2.5 12.5-6.5V31H30v3h11v1.2C38.8 38 35.4 40 31.5 40 24.6 40 19 34.4 19 27.5S24.6 15 31.5 15c4.5 0 8.4 2.2 10.6 5.5L44 18.5Z" fill="#F5F2E8" opacity="0.94"/>
    <!-- the zing: an accent corner glow -->
    <circle cx="44" cy="44" r="6" fill="url(#gp-zing)"/>
    <circle cx="44" cy="44" r="3" fill="#A3E635"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(76 0)" fill="#0A1330">
    <text x="0" y="42" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.02em">
